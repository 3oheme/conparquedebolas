<header class="site-header" role="banner">
  <div class="wrapper header-inner">
    {%- assign _lang = page.lang | default: "es" -%}
    {%- assign t = site.data.i18n[_lang] -%}
    <a class="site-logo" rel="author" href="{% if page.lang == 'en' %}/en/{% else %}/{% endif %}">
      <span class="site-logo__con">con</span> parque de bolas<span class="site-logo__dot">.</span>
    </a>
    {%- if page.lang == "en" and page.alternate_url -%}
      <a href="{{ page.alternate_url }}" class="lang-switch">{{ t.switch_lang }}</a>
    {%- elsif page.has_en and page.alternate_url -%}
      <a href="{{ page.alternate_url }}" class="lang-switch">{{ t.switch_lang }}</a>
    {%- endif -%}
  </div>
</header>
