<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  {%- if page.lang == "en" and page.alternate_url -%}
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}">
    <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.alternate_url }}">
    <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.alternate_url }}">
  {%- elsif page.lang == "es" and page.has_en and page.alternate_url -%}
    <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.url }}">
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.alternate_url }}">
    <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}">
  {%- endif -%}
</head>
