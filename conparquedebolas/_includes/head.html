<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  {%- if page.lang == "en" and page.alternate_url -%}
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}">
    <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.alternate_url }}">
    <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.alternate_url }}">
  {%- elsif page.lang == "es" and page.has_en and page.alternate_url -%}
    <link rel="alternate" hreflang="es" href="{{ site.url }}{{ page.url }}">
    <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.alternate_url }}">
    <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}">
  {%- endif -%}
</head>
