- nombre: "The Cabin Beer Garden"
  slug: "the-cabin"
  ciudad: "El Puerto de Santa María"
  por_que_kids_friendly: >
    Es probablemente la propuesta más completa de la zona: parque de bolas,
    minisala de cine y jardín exclusivo para niños separado por una
    cristalera del comedor adulto. Comes viendo a tus hijos jugar.
  por_que_kids_friendly_en: >
